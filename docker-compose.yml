services:
  intelligence-dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml-unified-intelligence
    # Corrected to use env_file instead of manual volume mount for credentials
    env_file:
      - ./frontend/.env
    environment:
      - MODEL_ROOT=/models
      - MODEL_IDLE_SECONDS=180
      - MODEL_MANAGER_VERBOSE=true
      - OPENAI_MODEL=gpt-4o-mini
    ports:
      - "8501:8501"
    volumes:
      # Persistent volume for local transformer models and adapters
      - ./models:/models
