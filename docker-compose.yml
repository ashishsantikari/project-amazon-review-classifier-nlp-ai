services:
  intelligence-dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml-unified-intelligence
    restart: unless-stopped
    # Integrated credential loading via env_file
    env_file:
      - ./frontend/.env
    environment:
      - MODEL_ROOT=/models
      - MODEL_IDLE_SECONDS=180
      - MODEL_MANAGER_VERBOSE=true
      - OPENAI_MODEL=gpt-4o-mini
      - HF_HOME=/app/.cache
      - TRANSFORMERS_CACHE=/app/.cache
    ports:
      - "8501:8501"
    volumes:
      # Persistent volume for local transformer models and adapters
      - ./models:/models
